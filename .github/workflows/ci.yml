name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
      - name: Install gems
        run: bundle install --jobs 4 --retry 3
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install npm deps
        run: npm ci
      - name: Run linters (SCSS/MD/HTML)
        run: npm run lint || true
      - name: Build site
        run: bundle exec jekyll build
      - name: Run Ruby tests (if present)
        run: |
          if [ -d spec ]; then
            bundle exec rspec || true
          else
            echo "No specs found; skipping rspec"
          fi
